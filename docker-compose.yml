services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./.env
    ports:
      - "8011:8011"
    volumes:
      - ./backend/storage:/app/storage

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://47.104.158.30:8011/api}
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://47.104.158.30:8011/api}
    ports:
      - "3001:3000"
    depends_on:
      - backend
